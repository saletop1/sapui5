<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Order Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script
        id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.120.2/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_fiori_3"
        data-sap-ui-libs="sap.m"
        data-sap-ui-bindingSyntax="complex"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{
            "so.app": "./"
        }'
    ></script>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body, #content {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
        }
    </style>
    <script>
        // Load view langsung setelah UI5 siap
        sap.ui.getCore().attachInit(function() {
            console.log("UI5 initialized, loading view...");
            var oView = sap.ui.xmlview({
                viewName: "so.app.view.Main",
                id: "mainView"
            });
            oView.placeAt("content");
            console.log("View placed at content");
        });
    </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
